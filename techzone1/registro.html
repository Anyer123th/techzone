<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Cuentas - TechZone</title>
  <link rel="stylesheet" href="css/estilos.css">
  <script src="js/db.js"></script>
  <script src="js/main.js"></script>
</head>
<body data-require-guest="true">
<header>
  <a href="index.html" class="brand">Tech<span>Zone</span></a>
  <nav id="main-nav"><a href="login.html">Iniciar Sesión</a></nav>
</header>
<main class="container">
  <div class="card" style="max-width:450px; margin:2rem auto;">
    <h1>Formulario de Registro 1: Alta de Cuenta</h1>
    
    <div id="alerts-container"></div>
    
    <form id="registro-form">
      <div class="form-group">
        <label for="usuario">Nombre de Usuario:</label>
        <input type="text" id="usuario" name="usuario" required minlength="4" placeholder="Ej: anyer_peralta">
      </div>
      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required minlength="6" placeholder="Mínimo 6 caracteres">
      </div>
      <button type="submit">Registrar Mi Cuenta en DB</button>
    </form>
  </div>
</main>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('registro-form');
        const alertsContainer = document.getElementById('alerts-container');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const usuarioVal = document.getElementById('usuario').value.trim();
            const passwordVal = document.getElementById('password').value;

            if (usuarioVal === "" || passwordVal === "") {
                alertsContainer.innerHTML = `<p style="color:var(--danger); margin-bottom:1rem;"><strong>Error: Complete todos los apartados obligatorios.</strong></p>`;
                return;
            }

            if (passwordVal.length < 6) {
                alertsContainer.innerHTML = `<p style="color:var(--danger); margin-bottom:1rem;"><strong>Error: Por seguridad, la contraseña debe poseer al menos 6 caracteres.</strong></p>`;
                return;
            }

            if (window.db) {
                const result = window.db.registerUser(usuarioVal, passwordVal);
                if (result) {
                    window.location.href = 'login.html?registered=1';
                } else {
                    alertsContainer.innerHTML = `<p style="color:var(--danger); margin-bottom:1rem;"><strong>El nombre de usuario ya está tomado en el servidor.</strong></p>`;
                }
            }
        });
    });
</script>
</body>
</html>
