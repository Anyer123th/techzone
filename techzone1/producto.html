<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Hardware - TechZone</title>
  <link rel="stylesheet" href="css/estilos.css">
  <style>
    /* Estilos UX exclusivos de la vitrina multimedia interactiva */
    .detail-layout { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
        gap: 3rem; 
        margin-top: 2rem; 
    }
    .img-box { 
        background-color: var(--bg-card); 
        border: 1px solid var(--border); 
        border-radius: 12px; 
        padding: 2rem; 
        text-align: center; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .img-box img { 
        max-width: 100%; 
        max-height: 350px; 
        object-fit: contain; 
        border-radius: 8px; 
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    /* Efecto zoom interactivo en la imagen multimedia */
    .img-box img:hover { 
        transform: scale(1.05); 
    }
    .tab-menu { 
        display: flex; 
        gap: 0.5rem; 
        margin: 3rem 0 1rem 0; 
        border-bottom: 1px solid var(--border); 
        padding-bottom: 0.5rem; 
    }
    .tab-btn { 
        background: none; 
        color: var(--text-muted); 
        border: none; 
        padding: 0.5rem 1rem; 
        cursor: pointer; 
        width: auto; 
        font-weight: 700; 
        font-size: 1rem;
    }
    .tab-btn.active { 
        color: #3b82f6; 
        border-bottom: 3px solid #3b82f6; 
    }
    .tab-content { 
        display: none; 
        background-color: var(--bg-card); 
        border: 1px solid var(--border); 
        padding: 2rem; 
        border-radius: 12px; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .tab-content.active { 
        display: block; 
    }
  </style>
  <script src="js/db.js"></script>
  <script src="js/main.js"></script>
</head>
<body>
<header>
  <a href="index.html" class="brand">Tech<span>Zone</span></a>
  <nav aria-label="Menú Principal" id="main-nav">
    <!-- Carga dinámica -->
  </nav>
</header>

<main class="container" id="product-container">
  <!-- Carga dinámica por JS -->
</main>

<footer>
    <p>&copy; 2026 TechZone SRL. Todos los derechos reservados.</p>
    <p>Santiago de los Caballeros, República Dominicana | Escuela Técnica de Informática</p>
    <div class="footer-links">
        <a href="tienda.html">Inicio / Tienda</a>
        <a href="contacto.html">Contacto y Soporte</a>
        <a href="dashboard.html">Mi Panel Privado</a>
    </div>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id') || '0');

        if (!productId || !window.db) {
            window.location.href = 'tienda.html';
            return;
        }

        const product = window.db.getProductById(productId);

        if (!product) {
            window.location.href = 'tienda.html';
            return;
        }

        // Configurar título del documento
        document.title = `${product.nombre} - TechZone`;

        function getProductImage(nombre, imagen) {
            const mapa = {
                'laptop': 'laptop.jpg', 'mouse': 'mouse.jpg', 'teclado': 'teclado.png',
                'monitor': 'monitor.jpg', 'cockpit': 'cockpit.jpg', 'volante': 'volante.png'
            };
            const imgName = (imagen || '').trim();
            if (imgName !== '') return imgName;
            const clave = (nombre || '').toLowerCase().trim();
            for (let k in mapa) {
                if (clave.includes(k)) return mapa[k];
            }
            return 'monitor.jpg';
        }

        const container = document.getElementById('product-container');
        container.innerHTML = `
          <div class="detail-layout">
            <div class="img-box">
              <img src="img/${encodeURIComponent(getProductImage(product.nombre, product.imagen))}" alt="Hardware ${escapeHtml(product.nombre)}">
              <p class="muted" style="margin-top: 1rem; font-size: 0.85rem;">💡 Pasa el cursor sobre el componente para ampliar la imagen.</p>
            </div>

            <div class="card" style="display:flex; flex-direction:column; justify-content:space-between;">
              <div>
                <span class="badge" style="background: rgba(59,130,246,0.15); color: #3b82f6; padding: 0.3rem 0.8rem; border-radius: 20px;">Componente Verificado</span>
                <h1 style="margin-top:1.5rem; font-size:2.2rem;">${escapeHtml(product.nombre)}</h1>
                <p style="font-size: 2.4rem; color: var(--success); font-weight: 800; margin: 1.5rem 0;">$${product.precio.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</p>
                <p class="muted">Garantía Corporativa: <span style="color: var(--success); font-weight: bold;">12 Meses de Fábrica</span></p>
                <p class="muted" style="margin-top: 0.5rem;">Disponibilidad: <span style="color: var(--success); font-weight: bold;">En Stock Local</span></p>
              </div>
              <a href="comprar.html?id=${product.id}" class="btn-action" style="padding:1.2rem; font-size:1.1rem; font-weight: 700; margin-top: 2rem; text-align: center;">🛒 Proceder a la Compra</a>
            </div>
          </div>

          <div class="tab-menu" role="tablist">
            <button class="tab-btn active" id="btn-desc" role="tab" aria-selected="true">Descripción del Hardware</button>
            <button class="tab-btn" id="btn-specs" role="tab" aria-selected="false">Ficha Técnica de Ingeniería</button>
          </div>

          <div id="desc" class="tab-content active" role="tabpanel">
            <h3 style="margin-bottom: 1rem; color: #3b82f6;">Información Comercial</h3>
            <p style="color: var(--text-muted); font-size: 1.05rem; text-align: justify;">${escapeHtml(product.descripcion).replace(/\n/g, '<br>')}</p>
          </div>
          
          <div id="specs" class="tab-content" role="tabpanel">
            <h3 style="margin-bottom: 1rem; color: #3b82f6;">Especificaciones Técnicas</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th scope="col" style="width: 40%;">Parámetro Técnico</th>
                            <th scope="col">Detalle Oficial Corporativo</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td><strong>Origen del Hardware</strong></td><td>Importación Certificada Premium</td></tr>
                        <tr><td><strong>Compatibilidad del Ecosistema</strong></td><td>Plug & Play universal en PC, Windows 10/11 y Consolas</td></tr>
                        <tr><td><strong>Soporte Técnico Especializado</strong></td><td>Asistencia directa mediante nuestro apartado de Contacto</td></tr>
                    </tbody>
                </table>
            </div>
          </div>
        `;

        // Listeners para las pestañas
        const btnDesc = document.getElementById('btn-desc');
        const btnSpecs = document.getElementById('btn-specs');
        const tabDesc = document.getElementById('desc');
        const tabSpecs = document.getElementById('specs');

        btnDesc.addEventListener('click', (e) => {
            tabSpecs.classList.remove('active');
            btnSpecs.classList.remove('active');
            btnSpecs.setAttribute('aria-selected', 'false');
            
            tabDesc.add('active'); // Wait, tabDesc.classList.add('active')
            btnDesc.classList.add('active');
            btnDesc.setAttribute('aria-selected', 'true');
        });

        btnSpecs.addEventListener('click', (e) => {
            tabDesc.classList.remove('active');
            btnDesc.classList.remove('active');
            btnDesc.setAttribute('aria-selected', 'false');
            
            tabSpecs.classList.add('active');
            btnSpecs.classList.add('active');
            btnSpecs.setAttribute('aria-selected', 'true');
        });

        // Corregir el bug de .add vs .classList.add
        btnDesc.addEventListener('click', (e) => {
            tabSpecs.classList.remove('active');
            btnSpecs.classList.remove('active');
            btnSpecs.setAttribute('aria-selected', 'false');
            
            tabDesc.classList.add('active');
            btnDesc.classList.add('active');
            btnDesc.setAttribute('aria-selected', 'true');
        });
        
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    });
</script>
</body>
</html>
